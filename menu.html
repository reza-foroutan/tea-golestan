<!DOCTYPE html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .header__nav {
        width: 100%;
        height: 40px;
        .header__nav__wrapper {
          width: inherit;
          height: inherit;
          display: flex;
          flex-flow: row wrap;
          justify-content: center;
          align-items: center;
          & nav {
            width: 75%;
            height: inherit;
            display: flex;
            flex-flow: row wrap;
            justify-content: center;
            align-items: center;
            column-gap: 25px;
            .menu__nav__item {
              width: auto;
              height: inherit;
              display: flex;
              flex-flow: row wrap;
              justify-content: center;
              align-items: center;
              position: relative;
              .menu__nav__item__link {
                width: auto;
                height: inherit;
                padding: 0 20px;
                box-sizing: border-box;
                -moz-box-sizing: border-box;
                -webkit-box-sizing: border-box;
                display: flex;
                flex-flow: row wrap;
                justify-content: center;
                align-items: center;
                text-align: center;
                text-decoration: none;
                color: #333;
                font-size: 14px;
                font-family: "IRANSansWeb(FaNum) Medium";
              }
              .mega__menu {
                width: 708px;
                height: 70vh;
                background-color: rgba(220, 20, 60, 0.803);
                position: absolute;
                top: 40px;
                right: calc(50% - 0px / 2);
                display: none;
              }
              &:hover .mega__menu {
                display: block;
              }
            }
          }
        }
      }
    </style>
  </head>
  <body>
    <div class="header__nav">
      <div class="header__nav__wrapper">
        <nav>
          <div class="menu__nav__item">
            <a href="#" class="active__menu menu__nav__item__link">صفحه اصلی</a>
          </div>
          <div class="menu__nav__item">
            <a href="#" class="menu__nav__item__link">شرکت گلستان</a>
            <div class="mega__menu"></div>
          </div>
          <div class="menu__nav__item">
            <a href="#" class="menu__nav__item__link"
              >محصولات
              <div class="mega__menu"></div>
            </a>
          </div>
          <div class="menu__nav__item">
            <a href="#" class="menu__nav__item__link">وبلاگ</a>
          </div>
          <div class="menu__nav__item">
            <a href="#" class="menu__nav__item__link">قرعه کشی</a>
          </div>
          <div class="menu__nav__item">
            <a href="#" class="menu__nav__item__link">استخدام</a>
          </div>
          <div class="menu__nav__item">
            <a href="#" class="menu__nav__item__link">تماس با ما </a>
          </div>
          <div class="menu__nav__item">
            <a href="#" class="border__less menu__nav__item__link">EN</a>
          </div>
        </nav>
      </div>
    </div>
  </body>
</html>
